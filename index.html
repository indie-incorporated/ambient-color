<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify you're human</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a1a;
    }

    .card {
      background: white;
      border: 1px solid #dde1e7;
      border-radius: 12px;
      padding: 40px 48px;
      width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: relative;
    }

    .lock-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      display: block;
    }

    .card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      color: #202124;
      margin-bottom: 8px;
    }

    .card .subtitle {
      font-size: 0.88rem;
      color: #5f6368;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 0 0 24px;
    }

    /* The CAPTCHA widget */
    .captcha-widget {
      border: 1px solid #c8cdd4;
      border-radius: 8px;
      padding: 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f9fa;
      position: relative;
      overflow: visible;
      min-height: 68px;
    }

    .captcha-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .checkbox-area {
      position: relative;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .checkbox-bg {
      width: 28px;
      height: 28px;
      border-radius: 3px;
      background: transparent;
    }

    .captcha-label {
      font-size: 0.95rem;
      color: #202124;
      font-weight: 500;
    }

    .captcha-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .captcha-logo {
      width: 32px;
      height: 32px;
    }

    .captcha-brand {
      font-size: 0.6rem;
      color: #80868b;
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.3;
    }

    /* Shy buttons — float freely over the page */
    .shy-btn {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid #4285f4;
      border-radius: 3px;
      background: white;
      cursor: pointer;
      transition: left 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  top  0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  opacity 0.4s ease;
      z-index: 100;
      opacity: 0;        /* start invisible; btn2 fades in after 20s */
      pointer-events: none;
    }

    .shy-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: #202124;
      color: white;
      font-size: 0.75rem;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 200;
    }

    #tooltip.show {
      opacity: 1;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #9aa0a6;
      text-align: center;
      line-height: 1.6;
    }

    .footer-note a {
      color: #4285f4;
      text-decoration: none;
    }

    .attempts-label {
      font-size: 1.1rem;
      text-align: center;
      margin-top: 12px;
      min-height: 20px;
      transition: opacity 0.3s;
      opacity: 0;
    }

    .attempts-label.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="tooltip"></div>

  <div class="card">
    <svg class="lock-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="22" width="32" height="22" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
      <path d="M16 22V16a8 8 0 0116 0v6" stroke="#4285f4" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="24" cy="33" r="3" fill="#4285f4"/>
    </svg>

    <h1>Verify you're human</h1>
    <p class="subtitle">Before continuing, we need to confirm<br>you're not an automated bot.</p>
    <hr class="divider">

    <div id="main-content">
      <div class="captcha-widget" id="captcha-widget">
        <div class="captcha-left">
          <div class="checkbox-area">
            <div class="checkbox-bg" id="checkbox-bg"></div>
          </div>
          <span class="captcha-label">I'm not a robot</span>
        </div>
        <div class="captcha-right">
          <svg class="captcha-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 4 L58 18 L58 46 L32 60 L6 46 L6 18 Z" fill="#f1f3f4" stroke="#dadce0" stroke-width="2"/>
            <path d="M32 14 a18 18 0 0 1 15.6 9" stroke="#4285f4" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M32 14 a18 18 0 0 0-15.6 9" stroke="#34a853" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M16.4 23 a18 18 0 0 0 0 18" stroke="#fbbc05" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M47.6 23 a18 18 0 0 1 0 18" stroke="#ea4335" stroke-width="4" fill="none" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="5" fill="#5f6368"/>
          </svg>
          <div class="captcha-brand">reCAPTCHA<br>Privacy · Terms</div>
        </div>
      </div>

      <p class="attempts-label" id="attempts-label"></p>
    </div>
  </div>

  <!-- First shy button (starts visible). The rest are created by JS. -->
  <button id="btn1" class="shy-btn visible" aria-label="I'm not a robot checkbox"></button>

  <script>
    const tooltip       = document.getElementById('tooltip');
    const attemptsLabel = document.getElementById('attempts-label');

    const FLEE_RADIUS   = 100;  // how close the cursor gets before a button runs
    const FLEE_DISTANCE = 140;  // how far it jumps each time
    const MAX_BUTTONS   = 3;    // cap at 3 boxes total
    const SPAWN_EVERY   = 5000; // a new box every 5 seconds (ms)

    // Each button is an object: { el, x, y, angleOffset }
    // angleOffset spreads the boxes so they don't flee in identical directions.
    // We use a different angle for each — spread evenly around the circle.
    const buttons = [];

    function createButton() {
      const el = document.createElement('button');
      el.className = 'shy-btn';
      el.setAttribute('aria-label', "I'm not a robot checkbox");
      document.body.appendChild(el);

      // Place it at the checkbox position to start
      const cbRect = document.getElementById('checkbox-bg').getBoundingClientRect();
      const b = {
        el,
        x: cbRect.left + cbRect.width  / 2,
        y: cbRect.top  + cbRect.height / 2,
        // Spread angle: divide 360° evenly among however many buttons exist
        angleOffset: (buttons.length * (360 / MAX_BUTTONS)) * (Math.PI / 180),
      };

      buttons.push(b);
      placeButton(b);

      // Small delay before making it visible so it fades in smoothly
      requestAnimationFrame(() => el.classList.add('visible'));
    }

    function placeButton(b) {
      b.el.style.left = (b.x - 14) + 'px';
      b.el.style.top  = (b.y - 14) + 'px';
    }

    // Wait for the page to fully render before reading the checkbox position.
    // "window.onload" fires once every image, font, and element is painted —
    // guaranteeing getBoundingClientRect() returns the real coordinates.
    window.addEventListener('load', () => {
      const firstBtn = document.getElementById('btn1');
      const cbRect0  = document.getElementById('checkbox-bg').getBoundingClientRect();
      const startX   = cbRect0.left + cbRect0.width  / 2;
      const startY   = cbRect0.top  + cbRect0.height / 2;
      buttons.push({ el: firstBtn, x: startX, y: startY, angleOffset: 0 });
      placeButton(buttons[0]);
    });

    // ─── Spawn a new button every 5s until we hit MAX_BUTTONS ────────
    // setInterval is like setTimeout but repeats forever on a set interval.
    // We check inside if we've hit the max, and if so we stop it with clearInterval.
    const spawnTimer = setInterval(() => {
      if (buttons.length >= MAX_BUTTONS) {
        clearInterval(spawnTimer); // stop the timer — we have enough buttons
        return;
      }
      createButton();
    }, SPAWN_EVERY);

    // ─── Mouse movement — make every visible button flee ─────────────
    document.addEventListener('mousemove', (e) => {
      buttons.forEach(b => {
        if (!b.el.classList.contains('visible')) return;

        const dx   = e.clientX - b.x;
        const dy   = e.clientY - b.y;
        const dist = Math.hypot(dx, dy);

        if (dist < FLEE_RADIUS) {
          const angle = Math.atan2(dy, dx) + b.angleOffset;
          const pad   = 20;

          let newX = Math.max(pad, Math.min(window.innerWidth  - pad, b.x - Math.cos(angle) * FLEE_DISTANCE));
          let newY = Math.max(pad, Math.min(window.innerHeight - pad, b.y - Math.sin(angle) * FLEE_DISTANCE));

          b.x = newX;
          b.y = newY;
          placeButton(b);
        }
      });
    });

    // ─── Clicks — show 🤖 and teleport all visible buttons ───────────
    function teleportButton(b, fromX, fromY) {
      const pad = 20;
      let newX, newY;
      do {
        newX = pad + Math.random() * (window.innerWidth  - pad * 2);
        newY = pad + Math.random() * (window.innerHeight - pad * 2);
      } while (Math.hypot(newX - fromX, newY - fromY) < 200);

      b.x = newX;
      b.y = newY;
      b.el.style.transition = 'none';
      placeButton(b);
      requestAnimationFrame(() => { b.el.style.transition = ''; });
    }

    document.addEventListener('click', (e) => {
      e.preventDefault();

      attemptsLabel.textContent = '🤖';
      attemptsLabel.classList.add('show');
      clearTimeout(attemptsLabel._t);
      attemptsLabel._t = setTimeout(() => attemptsLabel.classList.remove('show'), 1200);

      buttons.forEach(b => {
        if (b.el.classList.contains('visible')) teleportButton(b, e.clientX, e.clientY);
      });
    });
  </script>
</body>
</html>
