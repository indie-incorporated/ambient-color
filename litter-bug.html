<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Litter Bugs!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: #e8f5e9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    /* ── Score ── */
    #score {
      position: fixed;
      top: 20px;
      right: 28px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #2e7d32;
      background: white;
      border: 2px solid #a5d6a7;
      border-radius: 24px;
      padding: 8px 20px;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Title ── */
    #title {
      position: fixed;
      top: 20px;
      left: 28px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #2e7d32;
      z-index: 200;
    }

    #title span {
      font-size: 1.4rem;
    }

    /* ── Bin (blue box) ── */
    #bin {
      position: absolute;
      width: 90px;
      height: 90px;
      background: #1e88e5;
      border-radius: 12px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 4px 18px rgba(30,136,229,0.35);
      transition: transform 0.15s ease, background 0.15s ease;
      z-index: 10;
    }

    #bin.highlight {
      background: #0d47a1;
      transform: translate(-50%, -50%) scale(1.12);
    }

    #bin-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: white;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* ── Litter (pink circles) ── */
    .litter {
      position: absolute;
      width: 42px;
      height: 42px;
      background: #f48fb1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: grab;
      box-shadow: 0 3px 10px rgba(244,143,177,0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      z-index: 50;
    }

    .litter:hover {
      transform: scale(1.15);
      box-shadow: 0 6px 18px rgba(244,143,177,0.6);
    }

    .litter.dragging {
      cursor: grabbing;
      transform: scale(1.25);
      box-shadow: 0 10px 28px rgba(244,143,177,0.7);
      z-index: 100;
      transition: none;
    }

    /* ── Win screen ── */
    #win {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(232,245,233,0.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      gap: 16px;
    }

    #win.show {
      display: flex;
    }

    #win h1 {
      font-size: 2.8rem;
      color: #2e7d32;
    }

    #win p {
      font-size: 1.1rem;
      color: #555;
    }

    #win button {
      margin-top: 12px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 700;
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(30,136,229,0.4);
      transition: transform 0.1s;
    }

    #win button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div id="title"><span>🌿</span> No Litter Bugs!</div>
  <div id="score">🗑️ 0 / 10</div>

  <div id="bin">
    🗑️
    <div id="bin-label">BIN</div>
  </div>

  <div id="win">
    <div style="font-size:4rem">🎉</div>
    <h1>All clean!</h1>
    <p>You picked up every piece of litter. The park thanks you!</p>
    <button onclick="resetGame()">Play again</button>
  </div>

  <script>
    const TOTAL     = 10;
    const litterEmojis = ['🗑️','📄','🥤','🍬','🧃','🍟','🧴','📦','🥡','🍭'];
    let collected   = 0;
    let dragging    = null;  // the element currently being dragged
    let offsetX     = 0;     // where the user grabbed the circle (so it doesn't snap to center)
    let offsetY     = 0;

    const bin       = document.getElementById('bin');
    const scoreEl   = document.getElementById('score');
    const winScreen = document.getElementById('win');

    // ── Place litter pieces at random positions ───────────────────────
    function spawnLitter() {
      const pad = 80;
      // Bin is centered — keep litter away from the center zone
      for (let i = 0; i < TOTAL; i++) {
        const el = document.createElement('div');
        el.className = 'litter';
        el.textContent = litterEmojis[i];
        el.dataset.id = i;

        // Pick a random spot that isn't too close to center
        let x, y;
        do {
          x = pad + Math.random() * (window.innerWidth  - pad * 2);
          y = pad + Math.random() * (window.innerHeight - pad * 2);
        } while (
          Math.abs(x - window.innerWidth  / 2) < 140 &&
          Math.abs(y - window.innerHeight / 2) < 140
        );

        el.style.left = (x - 21) + 'px';
        el.style.top  = (y - 21) + 'px';

        el.addEventListener('mousedown', onGrab);
        document.body.appendChild(el);
      }
    }

    // ── Grab a litter piece ───────────────────────────────────────────
    function onGrab(e) {
      e.preventDefault();
      dragging = e.currentTarget;
      dragging.classList.add('dragging');

      const rect = dragging.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
    }

    // ── Drag ──────────────────────────────────────────────────────────
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;

      dragging.style.left = (e.clientX - offsetX) + 'px';
      dragging.style.top  = (e.clientY - offsetY)  + 'px';

      // Highlight the bin when hovering over it
      if (isOverBin(e.clientX, e.clientY)) {
        bin.classList.add('highlight');
      } else {
        bin.classList.remove('highlight');
      }
    });

    // ── Drop ──────────────────────────────────────────────────────────
    document.addEventListener('mouseup', (e) => {
      if (!dragging) return;

      if (isOverBin(e.clientX, e.clientY)) {
        // 🎯 Dropped in the bin!
        dragging.remove();
        collected++;
        scoreEl.textContent = `🗑️ ${collected} / ${TOTAL}`;
        bin.classList.remove('highlight');

        if (collected === TOTAL) {
          setTimeout(() => winScreen.classList.add('show'), 300);
        }
      } else {
        // Dropped elsewhere — just release it
        dragging.classList.remove('dragging');
      }

      dragging = null;
    });

    // ── Check if a point is over the bin ─────────────────────────────
    function isOverBin(x, y) {
      const r = bin.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    }

    // ── Reset ─────────────────────────────────────────────────────────
    function resetGame() {
      collected = 0;
      scoreEl.textContent = `🗑️ 0 / ${TOTAL}`;
      winScreen.classList.remove('show');
      document.querySelectorAll('.litter').forEach(el => el.remove());
      spawnLitter();
    }

    // ── Start ─────────────────────────────────────────────────────────
    spawnLitter();
  </script>
</body>
</html>
