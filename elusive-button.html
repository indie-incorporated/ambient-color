<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify you're human</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a1a;
    }

    .page-header {
      width: 100%;
      background: white;
      border-bottom: 1px solid #dde1e7;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: fixed;
      top: 0;
    }

    .page-header .logo-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4285f4, #34a853);
    }

    .page-header .site-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #202124;
    }

    .page-header .site-url {
      font-size: 0.8rem;
      color: #5f6368;
      margin-left: 4px;
    }

    .card {
      background: white;
      border: 1px solid #dde1e7;
      border-radius: 12px;
      padding: 40px 48px;
      width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: relative;
    }

    .lock-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      display: block;
    }

    .card h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      color: #202124;
      margin-bottom: 8px;
    }

    .card .subtitle {
      font-size: 0.88rem;
      color: #5f6368;
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 0 0 24px;
    }

    /* The CAPTCHA widget */
    .captcha-widget {
      border: 1px solid #c8cdd4;
      border-radius: 8px;
      padding: 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f9fa;
      position: relative;
      overflow: visible;
      min-height: 68px;
    }

    .captcha-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Checkbox area — button will overlay this */
    .checkbox-area {
      position: relative;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .checkbox-bg {
      width: 28px;
      height: 28px;
      border: 2px solid #bdc1c6;
      border-radius: 3px;
      background: white;
    }

    .captcha-label {
      font-size: 0.95rem;
      color: #202124;
      font-weight: 500;
    }

    .captcha-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .captcha-logo {
      width: 32px;
      height: 32px;
    }

    .captcha-brand {
      font-size: 0.6rem;
      color: #80868b;
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.3;
    }

    /* The elusive button — absolutely positioned over the checkbox */
    #shy-btn {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 2px solid #4285f4;
      border-radius: 3px;
      background: white;
      cursor: pointer;
      transition: left 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  top 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #shy-btn::after {
      content: '';
      display: none;
      width: 10px;
      height: 10px;
      background: #4285f4;
      border-radius: 1px;
    }

    #shy-btn.checked {
      background: #4285f4;
      border-color: #4285f4;
    }

    #shy-btn.checked::after {
      display: block;
      background: white;
      width: 14px;
      height: 10px;
      border-radius: 0;
      background: none;
      border-left: 3px solid white;
      border-bottom: 3px solid white;
      transform: rotate(-45deg) translateY(-2px);
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      background: #202124;
      color: white;
      font-size: 0.75rem;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 200;
    }

    #tooltip.show {
      opacity: 1;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 0.78rem;
      color: #9aa0a6;
      text-align: center;
      line-height: 1.6;
    }

    .footer-note a {
      color: #4285f4;
      text-decoration: none;
    }

    .attempts-label {
      font-size: 0.78rem;
      color: #ea4335;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
      transition: opacity 0.3s;
      opacity: 0;
    }

    .attempts-label.show {
      opacity: 1;
    }

    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px 0 0;
    }

    .success-overlay.show {
      display: flex;
    }

    .success-check {
      font-size: 2.2rem;
    }

    .success-msg {
      font-size: 0.95rem;
      color: #34a853;
      font-weight: 600;
    }

    .success-sub {
      font-size: 0.8rem;
      color: #5f6368;
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="logo-dot"></div>
    <span class="site-name">accounts.example.com</span>
    <span class="site-url">· Secure</span>
  </header>

  <div id="tooltip"></div>

  <div class="card">
    <svg class="lock-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="22" width="32" height="22" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
      <path d="M16 22V16a8 8 0 0116 0v6" stroke="#4285f4" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="24" cy="33" r="3" fill="#4285f4"/>
    </svg>

    <h1>Verify you're human</h1>
    <p class="subtitle">Before continuing, we need to confirm<br>you're not an automated bot.</p>
    <hr class="divider">

    <div id="main-content">
      <div class="captcha-widget" id="captcha-widget">
        <div class="captcha-left">
          <div class="checkbox-area">
            <div class="checkbox-bg" id="checkbox-bg"></div>
          </div>
          <span class="captcha-label">I'm not a robot</span>
        </div>
        <div class="captcha-right">
          <!-- reCAPTCHA-style logo (hand-drawn SVG) -->
          <svg class="captcha-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 4 L58 18 L58 46 L32 60 L6 46 L6 18 Z" fill="#f1f3f4" stroke="#dadce0" stroke-width="2"/>
            <path d="M32 14 a18 18 0 0 1 15.6 9" stroke="#4285f4" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M32 14 a18 18 0 0 0-15.6 9" stroke="#34a853" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M16.4 23 a18 18 0 0 0 0 18" stroke="#fbbc05" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M47.6 23 a18 18 0 0 1 0 18" stroke="#ea4335" stroke-width="4" fill="none" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="5" fill="#5f6368"/>
          </svg>
          <div class="captcha-brand">reCAPTCHA<br>Privacy · Terms</div>
        </div>
      </div>

      <p class="attempts-label" id="attempts-label"></p>
    </div>

    <div class="success-overlay" id="success-overlay">
      <div class="success-check">✅</div>
      <div class="success-msg">Verification complete</div>
      <div class="success-sub">You may now continue.</div>
    </div>

    <p class="footer-note">
      Protected by reCAPTCHA &nbsp;·&nbsp;
      <a href="#">Privacy</a> &nbsp;·&nbsp; <a href="#">Terms</a>
    </p>
  </div>

  <!-- The shy button — floats freely over the page -->
  <button id="shy-btn" aria-label="I'm not a robot checkbox"></button>

  <script>
    const btn = document.getElementById('shy-btn');
    const tooltip = document.getElementById('tooltip');
    const attemptsLabel = document.getElementById('attempts-label');
    const successOverlay = document.getElementById('success-overlay');
    const mainContent = document.getElementById('main-content');
    const checkboxBg = document.getElementById('checkbox-bg');

    const FLEE_RADIUS = 100;
    const FLEE_DISTANCE = 140;

    let btnX, btnY;
    let misses = 0;
    let verified = false;

    const taunts = ["🤖"];

    function initButtonPosition() {
      const cbRect = document.getElementById('checkbox-bg').getBoundingClientRect();
      btnX = cbRect.left + cbRect.width / 2;
      btnY = cbRect.top + cbRect.height / 2;
      positionButton();
    }

    function positionButton() {
      btn.style.left = (btnX - 14) + 'px';
      btn.style.top  = (btnY - 14) + 'px';
    }

    initButtonPosition();
    window.addEventListener('resize', initButtonPosition);

    document.addEventListener('mousemove', (e) => {
      if (verified) return;

      const cx = btnX;
      const cy = btnY;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < FLEE_RADIUS) {
        const angle = Math.atan2(dy, dx);
        let newX = btnX - Math.cos(angle) * FLEE_DISTANCE;
        let newY = btnY - Math.sin(angle) * FLEE_DISTANCE;

        const pad = 20;
        newX = Math.max(pad, Math.min(window.innerWidth  - pad, newX));
        newY = Math.max(pad + 60, Math.min(window.innerHeight - pad, newY));

        btnX = newX;
        btnY = newY;
        positionButton();

        // Show tooltip near cursor
        tooltip.textContent = "🤔 Hold still...";
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 28) + 'px';
        tooltip.classList.add('show');
      } else {
        tooltip.classList.remove('show');
      }
    });

    function teleportAway(fromX, fromY) {
      const pad = 20;
      const topPad = 80;
      let newX, newY;
      // Keep trying until we land far enough from the click
      do {
        newX = pad + Math.random() * (window.innerWidth  - pad * 2);
        newY = topPad + Math.random() * (window.innerHeight - topPad - pad);
      } while (Math.hypot(newX - fromX, newY - fromY) < 200);
      btnX = newX;
      btnY = newY;
      // Disable transition briefly so it snaps instantly
      btn.style.transition = 'none';
      positionButton();
      requestAnimationFrame(() => {
        btn.style.transition = '';
      });
    }

    // Any click anywhere — taunt and teleport
    document.addEventListener('click', (e) => {
      e.preventDefault();
      misses++;
      attemptsLabel.textContent = taunts[0];
      attemptsLabel.classList.add('show');
      clearTimeout(attemptsLabel._t);
      attemptsLabel._t = setTimeout(() => attemptsLabel.classList.remove('show'), 1200);
      teleportAway(e.clientX, e.clientY);
    });
  </script>
</body>
</html>
