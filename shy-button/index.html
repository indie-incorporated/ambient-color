<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify you're human</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a1a;
    }
    .card {
      background: white;
      border: 1px solid #dde1e7;
      border-radius: 12px;
      padding: 40px 48px;
      width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .lock-icon { width: 48px; height: 48px; margin: 0 auto 20px; display: block; }
    .card h1 { font-size: 1.35rem; font-weight: 700; text-align: center; color: #202124; margin-bottom: 8px; }
    .card .subtitle { font-size: 0.88rem; color: #5f6368; text-align: center; margin-bottom: 28px; line-height: 1.5; }
    .divider { border: none; border-top: 1px solid #e8eaed; margin: 0 0 24px; }
    .captcha-widget {
      border: 1px solid #c8cdd4;
      border-radius: 8px;
      padding: 18px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f9fa;
      min-height: 68px;
    }
    .captcha-left { display: flex; align-items: center; gap: 14px; }
    .checkbox-area { width: 28px; height: 28px; flex-shrink: 0; }
    .checkbox-bg { width: 28px; height: 28px; border-radius: 3px; background: transparent; }
    .captcha-label { font-size: 0.95rem; color: #202124; font-weight: 500; }
    .captcha-right { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .captcha-logo { width: 32px; height: 32px; }
    .captcha-brand { font-size: 0.6rem; color: #80868b; letter-spacing: 0.02em; text-align: center; line-height: 1.3; }
    .shy-btn {
      position: fixed;
      width: 28px; height: 28px;
      border: 2px solid #4285f4;
      border-radius: 3px;
      background: white;
      cursor: pointer;
      transition: left 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94), top 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s ease;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
    }
    .shy-btn.visible { opacity: 1; pointer-events: auto; }
    .attempts-label {
      font-size: 1.1rem; text-align: center; margin-top: 12px;
      min-height: 20px; transition: opacity 0.3s; opacity: 0;
    }
    .attempts-label.show { opacity: 1; }
    .footer-note { margin-top: 20px; font-size: 0.78rem; color: #9aa0a6; text-align: center; line-height: 1.6; }
    .footer-note a { color: #4285f4; text-decoration: none; }
  </style>
</head>
<body>
  <div style="position:fixed;top:0;left:0;right:0;height:60px;z-index:10000;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(240,242,245,0.95);">
    <a href="/" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:#888;text-decoration:none;">← Indie Inc</a>
    <a href="/ambient-color" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:#888;text-decoration:none;">Ambient Color →</a>
  </div>
  <div class="card">
    <svg class="lock-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="22" width="32" height="22" rx="4" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
      <path d="M16 22V16a8 8 0 0116 0v6" stroke="#4285f4" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="24" cy="33" r="3" fill="#4285f4"/>
    </svg>
    <h1>Verify you're human</h1>
    <p class="subtitle">Before continuing, we need to confirm<br>you're not an automated bot.</p>
    <hr class="divider">
    <div id="main-content">
      <div class="captcha-widget">
        <div class="captcha-left">
          <div class="checkbox-area"><div class="checkbox-bg" id="checkbox-bg"></div></div>
          <span class="captcha-label">I'm not a robot</span>
        </div>
        <div class="captcha-right">
          <svg class="captcha-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 4 L58 18 L58 46 L32 60 L6 46 L6 18 Z" fill="#f1f3f4" stroke="#dadce0" stroke-width="2"/>
            <path d="M32 14 a18 18 0 0 1 15.6 9" stroke="#4285f4" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M32 14 a18 18 0 0 0-15.6 9" stroke="#34a853" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M16.4 23 a18 18 0 0 0 0 18" stroke="#fbbc05" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M47.6 23 a18 18 0 0 1 0 18" stroke="#ea4335" stroke-width="4" fill="none" stroke-linecap="round"/>
            <circle cx="32" cy="32" r="5" fill="#5f6368"/>
          </svg>
          <div class="captcha-brand">reCAPTCHA<br>Privacy · Terms</div>
        </div>
      </div>
      <p class="attempts-label" id="attempts-label"></p>
    </div>
    <p class="footer-note">Protected by reCAPTCHA &nbsp;·&nbsp; <a href="#">Privacy</a> &nbsp;·&nbsp; <a href="#">Terms</a></p>
  </div>

  <button id="btn1" class="shy-btn visible"></button>

  <script>
    const attemptsLabel = document.getElementById('attempts-label');
    const FLEE_RADIUS = 100, FLEE_DISTANCE = 140, MAX_BUTTONS = 3, SPAWN_EVERY = 5000;
    const buttons = [];

    function createButton() {
      const el = document.createElement('button');
      el.className = 'shy-btn';
      document.body.appendChild(el);
      const cbRect = document.getElementById('checkbox-bg').getBoundingClientRect();
      const b = { el, x: cbRect.left + cbRect.width/2, y: cbRect.top + cbRect.height/2,
        angleOffset: (buttons.length * (360 / MAX_BUTTONS)) * (Math.PI / 180) };
      buttons.push(b);
      placeButton(b);
      requestAnimationFrame(() => el.classList.add('visible'));
    }

    function placeButton(b) {
      b.y = Math.max(80, b.y);
      b.el.style.left = (b.x - 14) + 'px';
      b.el.style.top  = (b.y - 14) + 'px';
    }

    window.addEventListener('load', () => {
      const cbRect = document.getElementById('checkbox-bg').getBoundingClientRect();
      const btn1 = document.getElementById('btn1');
      const b = { el: btn1, x: cbRect.left + cbRect.width/2, y: cbRect.top + cbRect.height/2, angleOffset: 0 };
      buttons.push(b);
      placeButton(b);
    });

    const spawnTimer = setInterval(() => {
      if (buttons.length >= MAX_BUTTONS) { clearInterval(spawnTimer); return; }
      createButton();
    }, SPAWN_EVERY);

    document.addEventListener('mousemove', (e) => {
      buttons.forEach(b => {
        if (!b.el.classList.contains('visible')) return;
        const dx = e.clientX - b.x, dy = e.clientY - b.y;
        if (Math.hypot(dx, dy) < FLEE_RADIUS) {
          const angle = Math.atan2(dy, dx) + b.angleOffset;
          const pad = 20;
          const topPad = 80;
          b.x = Math.max(pad, Math.min(window.innerWidth - pad,  b.x - Math.cos(angle) * FLEE_DISTANCE));
          b.y = Math.max(topPad, Math.min(window.innerHeight - pad, b.y - Math.sin(angle) * FLEE_DISTANCE));
          placeButton(b);
        }
      });
    });

    function teleportButton(b, fx, fy) {
      const pad = 20; const topPad = 80; let nx, ny;
      do { nx = pad + Math.random()*(window.innerWidth-pad*2); ny = topPad + Math.random()*(window.innerHeight-topPad-pad); }
      while (Math.hypot(nx-fx, ny-fy) < 200);
      b.x = nx; b.y = ny;
      b.el.style.transition = 'none'; placeButton(b);
      requestAnimationFrame(() => { b.el.style.transition = ''; });
    }

    document.addEventListener('click', (e) => {
      if (e.target.closest('a, [data-nav]')) return;
      if (e.clientY < 80) return;
      e.preventDefault();
      attemptsLabel.textContent = '🤖';
      attemptsLabel.classList.add('show');
      clearTimeout(attemptsLabel._t);
      attemptsLabel._t = setTimeout(() => attemptsLabel.classList.remove('show'), 1200);
      buttons.forEach(b => { if (b.el.classList.contains('visible')) teleportButton(b, e.clientX, e.clientY); });
    });
  </script>
</body>
</html>
